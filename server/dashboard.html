<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sensor Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0a0e17;
    --panel:     #0f1623;
    --border:    #1a2540;
    --accent:    #00e5ff;
    --accent2:   #ff6b35;
    --green:     #39ff14;
    --text:      #c8d8f0;
    --muted:     #4a5a7a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,229,255,0.015) 2px,
      rgba(0,229,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.error { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    gap: 24px;
  }

  /* Stat cards row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .stat-card.updated { border-top-color: var(--green); }
  .stat-card.updated::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(57,255,20,0.04);
    animation: flashbg 0.6s ease-out forwards;
  }
  @keyframes flashbg { to { opacity: 0; } }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
    transition: color 0.3s;
  }

  .stat-unit {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    font-family: var(--font-mono);
    letter-spacing: 1px;
  }

  .stat-card.raw .stat-value  { color: var(--accent2); }
  .stat-card.count .stat-value { color: #a78bfa; }

  /* Chart panel */
  .chart-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .legend {
    display: flex;
    gap: 20px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    font-family: var(--font-mono);
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .chart-wrap { position: relative; height: 280px; }

  /* Data table */
  .table-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 0.8rem;
  }

  thead th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 12px 12px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(26,37,64,0.6);
    transition: background 0.2s;
    animation: rowIn 0.4s ease-out;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  tbody tr:hover { background: rgba(0,229,255,0.03); }
  tbody tr:first-child { background: rgba(57,255,20,0.04); }

  tbody td {
    padding: 10px 12px;
    color: var(--text);
  }

  .td-sensor { color: var(--accent); }
  .td-voltage { color: var(--accent2); font-weight: bold; }
  .td-raw { color: #a78bfa; }
  .td-time { color: var(--muted); font-size: 0.72rem; }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.4;
  }
  .corner.tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
  .corner.tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<header>
  <div class="logo">ESP<span>//</span>SENSOR <span>&ndash;</span> LIVE</div>
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">CONNECTING</span>
  </div>
</header>

<div class="main">

  <!-- Stat cards -->
  <div class="stats-row">
    <div class="stat-card voltage" id="cardVoltage">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="stat-label">Last Voltage</div>
      <div class="stat-value" id="valVoltage">—</div>
      <div class="stat-unit">VOLTS</div>
    </div>
    <div class="stat-card raw" id="cardRaw">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="stat-label">Last Raw ADC</div>
      <div class="stat-value" id="valRaw">—</div>
      <div class="stat-unit">0 &ndash; 4095</div>
    </div>
    <div class="stat-card count" id="cardCount">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="stat-label">Total Readings</div>
      <div class="stat-value" id="valCount">0</div>
      <div class="stat-unit">SESSION</div>
    </div>
    <div class="stat-card" id="cardSensor">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="stat-label">Active Sensor</div>
      <div class="stat-value" style="font-size:1.4rem" id="valSensor">—</div>
      <div class="stat-unit">ID</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-panel">
    <div class="panel-header">
      <div class="panel-title">◈ Real-Time Signal — Last 60 Readings</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#00e5ff"></div><span style="color:#00e5ff">VOLTAGE</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b35"></div><span style="color:#ff6b35">RAW ÷ 1000</span></div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="sensorChart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="table-panel">
    <div class="panel-header">
      <div class="panel-title">◈ Recent Readings</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Sensor</th>
          <th>Voltage (V)</th>
          <th>Raw ADC</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<footer>ESP32 · SQLITE · FLASK-SOCK · CHART.JS &nbsp;|&nbsp; SENSOR DASHBOARD v1.0</footer>

<script>
// ── Chart setup ────────────────────────────────────────────────
const ctx = document.getElementById('sensorChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'Voltage (V)',
        data: [],
        borderColor: '#00e5ff',
        backgroundColor: 'rgba(0,229,255,0.06)',
        borderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 5,
        tension: 0.4,
        fill: true,
        yAxisID: 'yV'
      },
      {
        label: 'Raw ÷ 1000',
        data: [],
        borderColor: '#ff6b35',
        backgroundColor: 'rgba(255,107,53,0.05)',
        borderWidth: 1.5,
        pointRadius: 1,
        tension: 0.4,
        fill: false,
        yAxisID: 'yR'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#0f1623',
        borderColor: '#1a2540',
        borderWidth: 1,
        titleColor: '#4a5a7a',
        bodyColor: '#c8d8f0',
        titleFont: { family: 'Share Tech Mono', size: 10 },
        bodyFont: { family: 'Share Tech Mono', size: 11 }
      }
    },
    scales: {
      x: {
        ticks: { color: '#4a5a7a', font: { family: 'Share Tech Mono', size: 9 }, maxTicksLimit: 8 },
        grid: { color: 'rgba(26,37,64,0.8)' }
      },
      yV: {
        position: 'left',
        ticks: { color: '#00e5ff', font: { family: 'Share Tech Mono', size: 10 } },
        grid: { color: 'rgba(0,229,255,0.06)' }
      },
      yR: {
        position: 'right',
        ticks: { color: '#ff6b35', font: { family: 'Share Tech Mono', size: 10 } },
        grid: { display: false }
      }
    }
  }
});

// ── State ──────────────────────────────────────────────────────
let totalCount = 0;
const MAX_POINTS = 60;

function fmtTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return iso.slice(11, 19) || iso; }
}

function flash(cardId) {
  const el = document.getElementById(cardId);
  el.classList.remove('updated');
  void el.offsetWidth;
  el.classList.add('updated');
  setTimeout(() => el.classList.remove('updated'), 700);
}

function pushPoint(ts, voltage, raw) {
  const label = fmtTime(ts);
  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(voltage);
  chart.data.datasets[1].data.push(+(raw / 1000).toFixed(3));
  if (chart.data.labels.length > MAX_POINTS) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }
  chart.update('none');
}

function addTableRow(reading, prepend = true) {
  const tbody = document.getElementById('tableBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="td-sensor">${reading.sensor_id}</td>
    <td class="td-voltage">${reading.voltage.toFixed(3)}</td>
    <td class="td-raw">${reading.raw}</td>
    <td class="td-time">${fmtTime(reading.timestamp)}</td>
  `;
  if (prepend) tbody.insertBefore(tr, tbody.firstChild);
  else tbody.appendChild(tr);

  // Keep table max 20 rows
  while (tbody.rows.length > 20) tbody.deleteRow(tbody.rows.length - 1);
}

function updateStats(r) {
  document.getElementById('valVoltage').textContent = r.voltage.toFixed(3);
  document.getElementById('valRaw').textContent = r.raw;
  document.getElementById('valSensor').textContent = r.sensor_id;
  document.getElementById('valCount').textContent = ++totalCount;
  flash('cardVoltage'); flash('cardRaw'); flash('cardCount');
}

// ── WebSocket ──────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');

  ws.onopen = () => {
    dot.className = 'dot live';
    text.textContent = 'LIVE';
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'history') {
      // Populate chart and table from history
      msg.data.forEach(r => {
        pushPoint(r.timestamp, r.voltage, r.raw);
        addTableRow(r, false);
        totalCount++;
      });
      document.getElementById('valCount').textContent = totalCount;
      if (msg.data.length > 0) {
        const last = msg.data[msg.data.length - 1];
        document.getElementById('valVoltage').textContent = last.voltage.toFixed(3);
        document.getElementById('valRaw').textContent = last.raw;
        document.getElementById('valSensor').textContent = last.sensor_id;
      }
    }

    if (msg.type === 'new_reading') {
      pushPoint(msg.timestamp, msg.voltage, msg.raw);
      addTableRow(msg, true);
      updateStats(msg);
    }
  };

  ws.onclose = () => {
    dot.className = 'dot error';
    text.textContent = 'RECONNECTING';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
